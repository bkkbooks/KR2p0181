body:
  text: 郭店楚簡十五語叢一凡物由亡生有天有命有物有名天生倫人生化有命有度有名而後有倫有地有形有盡而後有厚有生有知而後好惡生有物有倫有緑而後教生有天有命有地有形有物有容有色有名有物有容有盡有厚有美有善有仁有智有義有禮有聖有善天生百物人為貴人之道也或由中出或由外入由中出者仁忠信由外入者禮樂刑仁生於人義生於道或生於內或生於外仁生德德生禮禮生樂由樂知刑知己而後知人知人而後知禮知禮而後知行其知博然後知命知天所為知人所為然後知道知道然後知命禮因人之情而為之善理而後樂生禮生於莊樂生於度禮齊樂靈則戚樂繁禮靈則慢易所以會天道人道也詩所以會古今之志也者春秋所以會古今之事也禮交之行述也樂或生或教者也書所以會古今之識者也凡有血氣者皆有喜有怒有慎有莊其體有容有色有聲有嗅有味有氣有志凡物有本有卯有終有始容色目司也聲耳司也嗅鼻司也味口司也氣容司也志心之司義亡能偽也賢者能理之為孝此非孝也為弟此非弟也不可為也而不可不為也為之此非也弗為此非也政其然而行治焉爾也政不達且生乎不達其然也教學其也其生也亡為乎其形知禮然後知刑刑非稽也上下皆得其所之謂信信非至齊也政其然而行怠安察天道以化民氣父子至上下也兄弟至先後也亡物不物皆致焉而亡非己取之者悲亡其所也亡非是之弗也者去寇不逮從一道惡人者義然不然厚於仁薄於義親而不尊父有親有尊尊而不親長弟親道也友君臣無親也不尊厚於義薄於仁人亡能為有察善亡為善察所知察所不知勢與聖為可察也君臣朋友其擇者也賓客清廟之度也多好者亡好者也數不盡也缺生乎未得也愛善之謂仁仁義為之臬備之謂聖堲由敬作有生乎名節度者也喪仁之端也求者亡有自來也浧聖之謂聖權可去可徙凡同者通禮不同不豐不殺凡物由望生物各止於其所我行皆有之決與信器也各以詹詞毀也乎與容與夫其行者食與色與疾止之樂疏
